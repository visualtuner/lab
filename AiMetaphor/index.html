<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
        <title>T'Bot Greeting</title>
        <link rel="stylesheet" type="text/css" href="../css/font/NotoSansKR/NotoSansKR.css">
    </head>

    <style>
        *, *:before, *:after { box-sizing: border-box; }
        html {
            width: 100%;
            height: 100%;
            font-family: 'NotoSansKR', 'Malgun Gothic', sans-serif;
            padding: 0;
            margin: 0;
            -ms-text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            width: 100%;
            height: auto;
            min-height: 100%;
            overflow: auto;
            font-size: 14px;
            font-weight: 400;
            color: #2a3138;
            background: linear-gradient(180deg, #FFF6EF 50%, #fff 100%);
            word-break: keep-all;
            position: relative;
            overflow-scrolling: touch;
            padding: 0;
            padding-top: 60px;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
        }



        /* AI상담 시작 상단 스타일 start */
        .t-bot-greeting {
            width: 100%;
            height: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        .t-bot-greeting .metaphor {
            position: relative;
            width: 144px;
            height: 144px;
            overflow: hidden;
        }

        .t-bot-greeting .metaphor-cover {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .t-bot-greeting .metaphor-bg {
            position: absolute;
            width: 66.666%;
            height: 66.666%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            overflow: hidden;
            border-radius: 50%;
            
        }

        .t-bot-greeting .metaphor-bg .color-blobs-wrap {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(16px);
            transform: scale(1.2);
            transform-origin: 40% 50%;
            animation: metaphor-pulse 1s infinite ease-in-out, metaphor-rotate 5s infinite ease-in-out;
        }

        .t-bot-greeting .metaphor-bg .color-blob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 0;
            border-radius: 50%;
            box-sizing: border-box;
            transform-origin: 0 50%;
            filter: blur(8px);
            mix-blend-mode: multiply;
        }

        .t-bot-greeting .metaphor-bg .color-blob:after {
            content: '';
            display: block;
            width: 84px;
            height: 84px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 100%;
            transform: translate(-50%, -50%);
        }

        .t-bot-greeting .metaphor-bg .color-blob.pink { transform: rotate(0deg); }
        .t-bot-greeting .metaphor-bg .color-blob.blue { transform: rotate(120deg); }
        .t-bot-greeting .metaphor-bg .color-blob.yellow { transform: rotate(240deg); }

        .t-bot-greeting .metaphor-bg .color-blob.pink:after { background-color: #FFB2BE; animation: metaphor-blob-pink-scale 8s infinite ease-in-out; }
        .t-bot-greeting .metaphor-bg .color-blob.blue:after { background-color: #B7FEFF; animation: metaphor-blob-blue-scale 8s infinite ease-in-out; }
        .t-bot-greeting .metaphor-bg .color-blob.yellow:after { background-color: #fff5cf; animation: metaphor-blob-yellow-scale 8s infinite ease-in-out; }

        @keyframes metaphor-pulse {
            0%, 100% { transform: scale(1.2); }
            50% { transform: scale(1.6); }
        }

        @keyframes metaphor-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes metaphor-blob-pink-scale {
            0% { transform: translate(-50%, -50%) scale(1); }
            16.5% { transform: translate(-50%, -50%) scale(1.8); z-index: 1; }
            33% { transform: translate(-50%, -50%) scale(1); z-index: 0; }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes metaphor-blob-blue-scale {
            0% { transform: translate(-50%, -50%) scale(1); }
            33% { transform: translate(-50%, -50%) scale(1); }
            49.5% { transform: translate(-50%, -50%) scale(1.8); z-index: 1; }
            66% { transform: translate(-50%, -50%) scale(1); z-index: 0; }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes metaphor-blob-yellow-scale {
            0% { transform: translate(-50%, -50%) scale(1); }
            66% { transform: translate(-50%, -50%) scale(1); }
            82.5% { transform: translate(-50%, -50%) scale(1.8); z-index: 1; }
            100% { transform: translate(-50%, -50%) scale(1); z-index: 0; }
        }

        .t-bot-greeting .message {
            text-align: center;
            margin:0;
        }

        .t-bot-greeting .message .greeting-message {
            text-align: center;
            margin:0;
            font-size:16px;
            font-weight:300;
            color: #2a3138;
        }

        .t-bot-greeting .message .help-message {
            margin-top: 24px;
        }

        .t-bot-greeting .message .help-message span {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -1px;
            background: linear-gradient(
                120deg,
                #00B3C5,
                #32FFB7,
                #00B3C5,
                #32FFB7
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: wave-text 8s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wave-text {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* AI상담 시작 상단 스타일 end */
    </style>

    <body>
        <!-- AI상담 시작 상단 마크업 start -->
        <div class="t-bot-greeting">
            <div class="metaphor">
                <div class="metaphor-bg">
                    <div class="color-blobs-wrap">
                        <div class="color-blob pink"></div>
                        <div class="color-blob blue"></div>
                        <div class="color-blob yellow"></div>
                    </div>
                </div>
                
                <img src="tbot_metaphor_cover.png" class="metaphor-cover" alt="T'Bot metaphor frame">
            </div>

            <div class="message">
                <p class="greeting-message"><em style="font-weight:600; font-style:normal;">김한국</em>님, 어서오세요.<br/>오랜만에 방문해 주셨네요.</p>

                <div class="help-message">
                    <span>오늘은 무엇을 도와드릴까요?</span>
                </div>
            </div>
        </div>
        <!-- AI상담 시작 상단 마크업 end -->
        
    </body>
</html>
