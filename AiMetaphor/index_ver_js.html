<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
        <title>T'Bot Greeting</title>
        <link rel="stylesheet" type="text/css" href="../css/font/NotoSansKR/NotoSansKR.css">
    </head>

    <style>
        *, *:before, *:after { box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'NotoSansKR', 'Malgun Gothic', sans-serif;
        }

        body {
            background: linear-gradient(180deg, #FFF6EF 50%, #fff 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 60px;
        }

        /* AI상담 시작 상단 스타일 start */
        .t-bot-greeting {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .t-bot-greeting .metaphor {
            position: relative;
            width: 144px;
            height: 144px;
            overflow: hidden;
        }

        .t-bot-greeting .metaphor-bg {
            position: absolute;
            width: 96px;
            height: 96px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            overflow: hidden;
            border-radius: 50%;
            background: #fff;
            z-index: 0;
            animation: metaphor-rotate 12s infinite ease-in-out;
        }
        
        @keyframes metaphor-rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .t-bot-greeting .color-blobs-wrap {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(12px); 
            transform: scale(1.2);
            background: #FFB2BE;
        }

        .t-bot-greeting .color-blob {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: 1;
        }

        .color-blob.pink { background-color: #FFB2BE; }
        .color-blob.blue { background-color: #B7FEFF; }
        .color-blob.yellow { background-color: #fff5cf; }

        .t-bot-greeting .metaphor-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .t-bot-greeting .message {
            text-align: center;
            margin-top: 20px;
        }

        .t-bot-greeting .message .greeting-message {
            font-size: 16px;
            font-weight: 300;
            color: #2a3138;
            line-height: 1.5;
            margin: 0;
        }

        .t-bot-greeting .message .help-message {
            margin-top: 24px;
        }

        .t-bot-greeting .message .help-message span {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -1px;
            background: linear-gradient(
                120deg,
                #00B3C5,
                #32FFB7,
                #00B3C5,
                #32FFB7
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: wave-text 8s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wave-text {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* AI상담 시작 상단 스타일 end */
    </style>

    <body>
        <div class="t-bot-greeting">
            <div class="metaphor">
                <div class="metaphor-bg">
                    <div class="color-blobs-wrap">
                        <div class="color-blob pink" id="blob1"></div>
                        <div class="color-blob blue" id="blob2"></div>
                        <div class="color-blob yellow" id="blob3"></div>
                    </div>
                </div>
                <img src="tbot_metaphor_cover.png" class="metaphor-cover" alt="T'Bot metaphor frame">
            </div>

            <div class="message">
                <p class="greeting-message"><em style="font-weight:600; font-style:normal;">김한국</em>님, 어서오세요.<br/>오랜만에 방문해 주셨네요.</p>
                <div class="help-message">
                    <span>오늘은 무엇을 도와드릴까요?</span>
                </div>
            </div>
        </div>

        <!-- 불규칙한 움직임을 위한 스크립트 -->
        <script>
            const blob1 = document.getElementById('blob1');
            const blob2 = document.getElementById('blob2');
            const blob3 = document.getElementById('blob3');

            let startTime = Date.now();

            function animate() {
                const now = Date.now();
                const elapsed = (now - startTime) / 800;

                const p1 = {
                    x: 8 + 12 * Math.cos(elapsed * 1.5),
                    y: 8 + 12 * Math.sin(elapsed * 2.2)
                };
                const p2 = {
                    x: 20 + 15 * Math.sin(elapsed * 1.2),
                    y: 10 + 15 * Math.cos(elapsed * 1.8)
                };
                const p3 = {
                    x: 10 + 18 * Math.cos(elapsed * 2.0),
                    y: 25 + 10 * Math.sin(elapsed * 1.1)
                };

                blob1.style.transform = `translate(${p1.x}px, ${p1.y}px) scale(${1 + 0.2 * Math.sin(elapsed)})`;
                blob2.style.transform = `translate(${p2.x}px, ${p2.y}px) scale(${1 + 0.15 * Math.cos(elapsed * 0.8)})`;
                blob3.style.transform = `translate(${p3.x}px, ${p3.y}px) scale(${1 + 0.25 * Math.sin(elapsed * 1.3)})`;

                requestAnimationFrame(animate);
            }

            animate();
        </script>
    </body>
</html>
