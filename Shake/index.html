<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Shake & Tap Challenge</title>
    <link rel="stylesheet" type="text/css" href="../css/font/NotoSansKR/NotoSansKR.css">
    <link rel="stylesheet" type="text/css" href="../css/font/LineIcons/LineIcons.css">

    <!-- Google Fonts Outfit loading -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
</head>

<style>
    *,
    *:before,
    *:after {
        box-sizing: border-box;
    }

    :root {
        interpolate-size: allow-keywords;
    }

    html {
        width: 100%;
        height: 100%;
        font-family: 'Outfit', 'NotoSansKR', 'Malgun Gothic', sans-serif;
        padding: 0;
        margin: 0;
        -ms-text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
        background-color: #0f172a;
    }

    body {
        width: 100%;
        min-height: 100%;
        overflow-y: auto;
        font-size: 14px;
        font-weight: 400;
        color: #f8fafc;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        word-break: keep-all;
        position: relative;
        overflow-scrolling: touch;
        padding: 24px 16px;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
    }

    .game-container {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: 10vh;
    }

    .header {
        text-align: center;
        margin-bottom: 8px;
    }

    .header h1 {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #ff4e50, #fe6a2b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .header p {
        font-size: 14px;
        color: #94a3b8;
        margin: 0;
        font-weight: 400;
        line-height: 1.5;
    }

    .shake-game {
        width: 100%;
        aspect-ratio: 1.1;
        background: rgba(30, 41, 59, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 24px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        position: relative;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
    }

    .shake-game:active {
        transform: scale(0.98);
        border-color: rgba(254, 106, 43, 0.3);
    }

    @keyframes gamePulse {
        0% {
            transform: scale(1);
            border-color: rgba(254, 106, 43, 0.8);
        }

        50% {
            transform: scale(0.97);
        }

        100% {
            transform: scale(1);
            border-color: rgba(255, 255, 255, 0.08);
        }
    }

    .shake-game.input-pulse {
        animation: gamePulse 0.15s ease-out;
    }

    .shake-game .gauge {
        width: 32px;
        height: 100%;
        background: rgba(15, 23, 42, 0.6);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.6);
    }

    .shake-game .gauge .fill {
        width: 100%;
        position: absolute;
        bottom: 0;
        left: 0;
        background: linear-gradient(to top, #ff4e50, #fe6a2b, #ffb347);
        border-radius: 16px;
        transition: height 0.08s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        pointer-events: none;
        box-shadow: 0 0 20px rgba(254, 106, 43, 0.6);
    }

    /* Bubbles in the gauge fill for a dynamic look */
    .shake-game .gauge .fill::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
        background-size: 8px 8px;
        opacity: 0.4;
        animation: bubbleUp 2s linear infinite;
    }

    @keyframes bubbleUp {
        0% {
            background-position: 0 0;
        }

        100% {
            background-position: 0 -80px;
        }
    }

    .action-area {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        pointer-events: none;
    }

    .action-icon {
        width: 80px;
        height: 80px;
        fill: #64748b;
        transition: fill 0.3s, transform 0.3s;
    }

    .shake-game.playing .action-icon {
        fill: #fe6a2b;
        animation: shakeIcon 0.8s ease infinite alternate;
    }

    @keyframes shakeIcon {
        0% {
            transform: rotate(-8deg) scale(1.05);
        }

        100% {
            transform: rotate(8deg) scale(1.05);
        }
    }

    .shake-waves {
        opacity: 0;
        transition: opacity 0.3s;
        transform-origin: center;
    }

    .shake-game.playing .shake-waves {
        opacity: 1;
        animation: wavePulse 0.4s ease infinite alternate;
    }

    @keyframes wavePulse {
        0% {
            transform: scaleX(0.85);
            opacity: 0.3;
        }

        100% {
            transform: scaleX(1.15);
            opacity: 0.9;
        }
    }

    .action-text {
        font-size: 14px;
        font-weight: 500;
        color: #64748b;
        text-align: center;
        line-height: 1.6;
        transition: color 0.3s;
    }

    .shake-game.playing .action-text {
        color: #cbd5e1;
    }

    .game-start-btn {
        width: 100%;
        height: 56px;
        border-radius: 18px;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #ffffff;
        background: linear-gradient(135deg, #fe6a2b, #ff4e50);
        box-shadow: 0 6px 20px rgba(254, 106, 43, 0.4);
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        -webkit-tap-highlight-color: transparent;
    }

    .game-start-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(254, 106, 43, 0.5);
    }

    .game-start-btn:active {
        transform: translateY(1px);
    }

    .game-start-btn.playing {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
    }
</style>

<body>
    <div class="game-container">
        <div class="header">
            <h1>Shake & Tap</h1>
            <p>START 버튼을 누르고 화면을 빠르게 탭하거나<br>모바일 기기를 흔들어서 게이지를 채우세요!</p>
        </div>

        <div class="shake-game">
            <div class="gauge">
                <div class="fill" style="height:0%;"></div>
            </div>
            <div class="action-area">
                <svg class="action-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <!-- Phone shape -->
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z" />
                    <!-- Home button -->
                    <circle cx="12" cy="21" r="1" />
                    <!-- Shaking motion waves -->
                    <g class="shake-waves">
                        <path d="M3 8c-.3 0-.5.2-.5.5v7c0 .3.2.5.5.5s.5-.2.5-.5v-7c0-.3-.2-.5-.5-.5zM21 8c-.3 0-.5.2-.5.5v7c0 .3.2.5.5.5s.5-.2.5-.5v-7c0-.3-.2-.5-.5-.5z" />
                        <path d="M1 9.5c-.3 0-.5.2-.5.5v4c0 .3.2.5.5.5s.5-.2.5-.5v-4c0-.3-.2-.5-.5-.5zM23 9.5c-.3 0-.5.2-.5.5v4c0 .3.2.5.5.5s.5-.2.5-.5v-4c0-.3-.2-.5-.5-.5z" />
                    </g>
                </svg>
                <div class="action-text">대기 중...</div>
            </div>
        </div>

        <button type="button" class="game-start-btn">START</button>
    </div>

    <script>
        // 흔들기 및 터치 설정 상수
        const SHAKE_THRESHOLD = 15;    // 흔들기 감지 강도 임계값
        const SHAKE_GAIN = 1.0;        // 1회 흔들림 시 상승할 게이지양 (%)
        const TAP_GAIN = 1.0;          // 1회 탭 시 상승할 게이지양 (%)
        const DECAY_DELAY = 500;       // 무입력 시 감쇠가 시작될 때까지의 대기 시간 (ms)
        const DECAY_SPEED = 15;        // 초당 게이지 감쇠 속도 (% / sec)

        class ShakeGame {
            constructor() {
                this.$game = $('.shake-game');
                this.$fill = $('.fill');
                this.$startBtn = $('.game-start-btn');

                this.progress = 0;
                this.isPlaying = false;

                // Idle and Decay tracking variables
                this.lastInputTime = 0;
                this.lastFrameTime = 0;
                this.animationFrameId = null;

                // Motion sensor tracking variables
                this.lastX = null;
                this.lastY = null;
                this.lastZ = null;
                this.lastShakeTime = 0;

                this.motionHandler = null;

                this.bindEvents();
            }

            bindEvents() {
                // Game activation button click
                this.$startBtn.on('click', () => {
                    this.handleStartBtnClick();
                });

                // Fast click/tap triggers gauge fill
                this.$game.on('pointerdown', (e) => {
                    if (!this.isPlaying) return;
                    e.preventDefault();
                    this.registerInput(TAP_GAIN);
                });
            }

            async handleStartBtnClick() {
                if (this.isPlaying) {
                    this.stopGame('stopped');
                    return;
                }

                let permissionGranted = false;

                // Request device motion permission on supported environments (iOS, Samsung, etc.)
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceMotionEvent.requestPermission();
                        permissionGranted = (permissionState === 'granted');
                    } catch (error) {
                        console.error('Motion permission error:', error);
                        alert('모션 권한 요청 도중 문제가 발생했습니다.');
                    }
                } else {
                    // Desktop or standard Android environment which doesn't need explicit permission pop-up
                    permissionGranted = true;
                }

                if (permissionGranted) {
                    this.startGame();
                } else {
                    alert('가속도 센서 권한이 허용되지 않았습니다. 클릭/탭 모드로 동작합니다.');
                    this.startGame(); // Start anyway so clicking still works
                }
            }

            startGame() {
                this.progress = 0;
                this.isPlaying = true;
                this.lastInputTime = Date.now();
                this.lastFrameTime = Date.now();

                this.lastX = null;
                this.lastY = null;
                this.lastZ = null;

                this.$game.addClass('playing');
                $('.action-text').html('마구 흔들거나<br>터치하세요!');
                this.$startBtn.addClass('playing').text('STOP');

                this.dispatchEvent('shake-game:start', { state: '진행 중' });

                // Register DeviceMotion listener
                this.motionHandler = (e) => this.handleMotion(e);
                window.addEventListener('devicemotion', this.motionHandler, true);

                // Run requestAnimationFrame decay loop
                this.gameLoop();
            }

            stopGame(reason = 'stopped') {
                this.isPlaying = false;

                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }

                if (this.motionHandler) {
                    window.removeEventListener('devicemotion', this.motionHandler, true);
                    this.motionHandler = null;
                }

                this.$game.removeClass('playing');
                $('.action-text').text('대기 중...');
                this.$startBtn.removeClass('playing').text('START');

                this.dispatchEvent('shake-game:stop', { reason });
            }

            reset() {
                this.progress = 0;
                this.$fill.css('height', '0%');
                this.dispatchEvent('shake-game:progress', { progress: 0 });
            }

            gameLoop() {
                if (!this.isPlaying) return;

                const now = Date.now();
                const elapsedSinceInput = now - this.lastInputTime;

                // Decay the gauge fill if inactive for DECAY_DELAY milliseconds
                if (elapsedSinceInput > DECAY_DELAY && this.progress > 0) {
                    const dt = (now - this.lastFrameTime) / 1000;
                    const decayAmount = DECAY_SPEED * dt;
                    const nextProgress = Math.max(0, this.progress - decayAmount);

                    this.progress = nextProgress;
                    this.$fill.css('height', `${this.progress}%`);

                    this.dispatchEvent('shake-game:progress', { progress: this.progress });
                    this.dispatchEvent('shake-game:decay', { progress: this.progress, decayAmount });
                }

                this.lastFrameTime = now;
                this.animationFrameId = requestAnimationFrame(() => this.gameLoop());
            }

            registerInput(increment) {
                if (!this.isPlaying) return;

                this.lastInputTime = Date.now();
                this.lastFrameTime = Date.now(); // Sync frame for decay interval calculation

                const nextProgress = Math.min(100, this.progress + increment);
                this.progress = nextProgress;

                this.$fill.css('height', `${this.progress}%`);
                this.dispatchEvent('shake-game:progress', { progress: this.progress });

                // Trigger nice tap scale animation
                this.$game.removeClass('input-pulse');
                void this.$game[0].offsetWidth; // force element reflow
                this.$game.addClass('input-pulse');

                if (this.progress >= 100) {
                    this.handleSuccess();
                }
            }

            handleSuccess() {
                this.stopGame('success');
                this.dispatchEvent('shake-game:success', { progress: 100 });

                // Device vibration feedback if supported
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100, 50, 200]);
                }

                setTimeout(() => {
                    alert('성공');
                    this.reset();
                }, 120);
            }

            handleMotion(event) {
                if (!this.isPlaying) return;

                const acceleration = event.acceleration || event.accelerationIncludingGravity;
                if (!acceleration) return;

                const x = acceleration.x ?? 0;
                const y = acceleration.y ?? 0;
                const z = acceleration.z ?? 0;

                if (this.lastX !== null) {
                    // Calculate shaking delta (variation in all three axes)
                    const deltaX = Math.abs(x - this.lastX);
                    const deltaY = Math.abs(y - this.lastY);
                    const deltaZ = Math.abs(z - this.lastZ);

                    const motionDelta = deltaX + deltaY + deltaZ;

                    if (motionDelta > SHAKE_THRESHOLD) {
                        const now = Date.now();
                        // Limit polling triggers to every 80ms to keep game rate uniform across devices
                        if (now - this.lastShakeTime > 80) {
                            this.registerInput(SHAKE_GAIN);
                            this.lastShakeTime = now;
                        }
                    }
                }

                this.lastX = x;
                this.lastY = y;
                this.lastZ = z;
            }

            dispatchEvent(name, detail = {}) {
                const event = new CustomEvent(name, {
                    bubbles: true,
                    cancelable: true,
                    detail: {
                        ...detail,
                        progress: this.progress,
                        isPlaying: this.isPlaying,
                        game: this
                    }
                });
                this.$game[0].dispatchEvent(event);
            }
        }

        // Initialize game on document load
        $(function () {
            window.gameInstance = new ShakeGame();
        });
    </script>
</body>

</html>
