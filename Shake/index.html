<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Shake & Tap Challenge</title>
    <link rel="stylesheet" type="text/css" href="../css/font/NotoSansKR/NotoSansKR.css">
    <link rel="stylesheet" type="text/css" href="../css/font/LineIcons/LineIcons.css">

    <!-- Google Fonts Outfit loading -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
</head>

<style>
    *,
    *:before,
    *:after {
        box-sizing: border-box;
    }

    :root {
        interpolate-size: allow-keywords;
    }

    html {
        width: 100%;
        height: 100%;
        font-family: 'Outfit', 'NotoSansKR', 'Malgun Gothic', sans-serif;
        padding: 0;
        margin: 0;
        -ms-text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
        background-color: #0f172a;
    }

    body {
        width: 100%;
        min-height: 100%;
        overflow-y: auto;
        font-size: 14px;
        font-weight: 400;
        color: #f8fafc;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        word-break: keep-all;
        position: relative;
        overflow-scrolling: touch;
        padding: 24px 16px;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
    }

    .game-container {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .header {
        text-align: center;
        margin-bottom: 8px;
    }

    .header h1 {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #ff4e50, #fe6a2b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .header p {
        font-size: 14px;
        color: #94a3b8;
        margin: 0;
        font-weight: 400;
        line-height: 1.5;
    }

    .shake-game {
        width: 100%;
        aspect-ratio: 1.1;
        background: rgba(30, 41, 59, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 24px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        position: relative;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transition: transform 0.1s ease-out, border-color 0.3s, box-shadow 0.3s;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
    }

    .shake-game:active {
        transform: scale(0.98);
        border-color: rgba(254, 106, 43, 0.3);
    }

    @keyframes gamePulse {
        0% {
            transform: scale(1);
            border-color: rgba(254, 106, 43, 0.8);
        }

        50% {
            transform: scale(0.97);
        }

        100% {
            transform: scale(1);
            border-color: rgba(255, 255, 255, 0.08);
        }
    }

    .shake-game.input-pulse {
        animation: gamePulse 0.15s ease-out;
    }

    .shake-game .gauge {
        width: 32px;
        height: 100%;
        background: rgba(15, 23, 42, 0.6);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.6);
    }

    .shake-game .gauge .fill {
        width: 100%;
        position: absolute;
        bottom: 0;
        left: 0;
        background: linear-gradient(to top, #ff4e50, #fe6a2b, #ffb347);
        border-radius: 16px;
        transition: height 0.08s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        pointer-events: none;
        box-shadow: 0 0 20px rgba(254, 106, 43, 0.6);
    }

    /* Bubbles in the gauge fill for a dynamic look */
    .shake-game .gauge .fill::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
        background-size: 8px 8px;
        opacity: 0.4;
        animation: bubbleUp 2s linear infinite;
    }

    @keyframes bubbleUp {
        0% {
            background-position: 0 0;
        }

        100% {
            background-position: 0 -80px;
        }
    }

    .action-area {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        pointer-events: none;
    }

    .action-icon {
        width: 80px;
        height: 80px;
        fill: #64748b;
        transition: fill 0.3s, transform 0.3s;
    }

    .shake-game.playing .action-icon {
        fill: #fe6a2b;
        animation: shakeIcon 0.8s ease infinite alternate;
    }

    @keyframes shakeIcon {
        0% {
            transform: rotate(-8deg) scale(1.05);
        }

        100% {
            transform: rotate(8deg) scale(1.05);
        }
    }

    .shake-waves {
        opacity: 0;
        transition: opacity 0.3s;
        transform-origin: center;
    }

    .shake-game.playing .shake-waves {
        opacity: 1;
        animation: wavePulse 0.4s ease infinite alternate;
    }

    @keyframes wavePulse {
        0% {
            transform: scaleX(0.85);
            opacity: 0.3;
        }

        100% {
            transform: scaleX(1.15);
            opacity: 0.9;
        }
    }

    .action-text {
        font-size: 14px;
        font-weight: 500;
        color: #64748b;
        text-align: center;
        line-height: 1.6;
        transition: color 0.3s;
    }

    .shake-game.playing .action-text {
        color: #cbd5e1;
    }

    .game-start-btn {
        width: 100%;
        height: 56px;
        border-radius: 18px;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #ffffff;
        background: linear-gradient(135deg, #fe6a2b, #ff4e50);
        box-shadow: 0 6px 20px rgba(254, 106, 43, 0.4);
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        -webkit-tap-highlight-color: transparent;
    }

    .game-start-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(254, 106, 43, 0.5);
    }

    .game-start-btn:active {
        transform: translateY(1px);
    }

    .game-start-btn.playing {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
    }

    /* Settings & Customization Panel */
    .tuning-panel {
        background: rgba(30, 41, 59, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        padding: 20px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }

    .tuning-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
    }

    .tuning-header h2 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        color: #94a3b8;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .tuning-toggle-icon {
        width: 16px;
        height: 16px;
        fill: #64748b;
        transition: transform 0.3s;
    }

    .tuning-content {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
        max-height: 0px;
        /* starts collapsed */
    }

    .tuning-content.open {
        max-height: 500px;
    }

    .setting-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .setting-label {
        font-size: 12px;
        color: #94a3b8;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .setting-label span.value {
        color: #fe6a2b;
        font-weight: 600;
        font-family: monospace;
    }

    input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(15, 23, 42, 0.6);
        border-radius: 2px;
        outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fe6a2b;
        cursor: pointer;
        transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
    }

    .dashboard-monitor {
        background: rgba(15, 23, 42, 0.4);
        border-radius: 14px;
        padding: 12px 16px;
        margin-top: 8px;
        font-family: monospace;
        font-size: 11px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .monitor-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .monitor-label {
        color: #64748b;
        font-size: 10px;
    }

    .monitor-value {
        color: #cbd5e1;
        font-weight: bold;
    }
</style>

<body>
    <div class="game-container">
        <div class="header">
            <h1>Shake & Tap</h1>
            <p>START 버튼을 누르고 화면을 빠르게 탭하거나<br>모바일 기기를 흔들어서 게이지를 채우세요!</p>
        </div>

        <div class="shake-game">
            <div class="gauge">
                <div class="fill" style="height:0%;"></div>
            </div>
            <div class="action-area">
                <svg class="action-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <!-- Phone shape -->
                    <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z" />
                    <!-- Home button -->
                    <circle cx="12" cy="21" r="1" />
                    <!-- Shaking motion waves -->
                    <g class="shake-waves">
                        <path d="M3 8c-.3 0-.5.2-.5.5v7c0 .3.2.5.5.5s.5-.2.5-.5v-7c0-.3-.2-.5-.5-.5zM21 8c-.3 0-.5.2-.5.5v7c0 .3.2.5.5.5s.5-.2.5-.5v-7c0-.3-.2-.5-.5-.5z" />
                        <path d="M1 9.5c-.3 0-.5.2-.5.5v4c0 .3.2.5.5.5s.5-.2.5-.5v-4c0-.3-.2-.5-.5-.5zM23 9.5c-.3 0-.5.2-.5.5v4c0 .3.2.5.5.5s.5-.2.5-.5v-4c0-.3-.2-.5-.5-.5z" />
                    </g>
                </svg>
                <div class="action-text">대기 중...</div>
            </div>
        </div>

        <button type="button" class="game-start-btn">START</button>

        <!-- Sensibility & Tuning Control Panel -->
        <div class="tuning-panel">
            <div class="tuning-header">
                <h2>
                    <svg style="width:16px; height:16px; fill:#94a3b8;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z" />
                    </svg>
                    감도 설정 및 디버그 모니터
                </h2>
                <svg class="tuning-toggle-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 10l5 5 5-5z" />
                </svg>
            </div>

            <div class="tuning-content">
                <div class="setting-row">
                    <div class="setting-label">
                        <span>흔들기 감계값 (Threshold)</span>
                        <span class="value"><span id="val-shake-threshold">15</span></span>
                    </div>
                    <input type="range" id="setting-shake-threshold" min="5" max="40" step="1" value="15">
                </div>

                <div class="setting-row">
                    <div class="setting-label">
                        <span>흔들기 게이지 증가량 (Shake Gain)</span>
                        <span class="value"><span id="val-shake-increment">8.0</span>%</span>
                    </div>
                    <input type="range" id="setting-shake-increment" min="1" max="30" step="0.5" value="8.0">
                </div>

                <div class="setting-row">
                    <div class="setting-label">
                        <span>광클릭 게이지 증가량 (Tap Gain)</span>
                        <span class="value"><span id="val-click-increment">5.0</span>%</span>
                    </div>
                    <input type="range" id="setting-click-increment" min="1" max="25" step="0.5" value="5.0">
                </div>

                <div class="setting-row">
                    <div class="setting-label">
                        <span>감쇠 시작 대기시간 (Decay Delay)</span>
                        <span class="value"><span id="val-decay-delay">500</span>ms</span>
                    </div>
                    <input type="range" id="setting-decay-delay" min="100" max="2000" step="100" value="500">
                </div>

                <div class="setting-row">
                    <div class="setting-label">
                        <span>초당 감쇠 속도 (Decay Speed)</span>
                        <span class="value"><span id="val-decay-rate">15</span>%/초</span>
                    </div>
                    <input type="range" id="setting-decay-rate" min="5" max="80" step="1" value="15">
                </div>

                <div class="dashboard-monitor">
                    <div class="monitor-item">
                        <span class="monitor-label">게임 상태</span>
                        <span class="monitor-value" id="monitor-state">대기 중</span>
                    </div>
                    <div class="monitor-item">
                        <span class="monitor-label">현재 게이지</span>
                        <span class="monitor-value" id="monitor-progress">0%</span>
                    </div>
                    <div class="monitor-item">
                        <span class="monitor-label">실시간 가속도 변화량</span>
                        <span class="monitor-value" id="monitor-motion">0.00</span>
                    </div>
                    <div class="monitor-item">
                        <span class="monitor-label">센서 지원 상태</span>
                        <span class="monitor-value" id="monitor-sensor">확인 중...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ShakeGame {
            constructor() {
                this.$game = $('.shake-game');
                this.$fill = $('.fill');
                this.$startBtn = $('.game-start-btn');

                // Settings inputs
                this.$shakeThresholdInput = $('#setting-shake-threshold');
                this.$shakeIncrementInput = $('#setting-shake-increment');
                this.$clickIncrementInput = $('#setting-click-increment');
                this.$decayDelayInput = $('#setting-decay-delay');
                this.$decayRateInput = $('#setting-decay-rate');

                // Debug monitor elements
                this.$monitorState = $('#monitor-state');
                this.$monitorProgress = $('#monitor-progress');
                this.$monitorMotion = $('#monitor-motion');

                this.config = {};
                this.loadConfig();

                this.progress = 0;
                this.isPlaying = false;

                // Idle and Decay tracking variables
                this.lastInputTime = 0;
                this.lastFrameTime = 0;
                this.animationFrameId = null;

                // Motion sensor tracking variables
                this.lastX = null;
                this.lastY = null;
                this.lastZ = null;
                this.lastShakeTime = 0;

                this.motionHandler = null;

                this.bindEvents();
                this.detectCapabilities();
            }

            loadConfig() {
                this.config = {
                    shakeThreshold: parseFloat(this.$shakeThresholdInput.val()) || 15,
                    shakeIncrement: parseFloat(this.$shakeIncrementInput.val()) || 8,
                    clickIncrement: parseFloat(this.$clickIncrementInput.val()) || 5,
                    decayDelay: parseInt(this.$decayDelayInput.val()) || 500,
                    decayRate: parseFloat(this.$decayRateInput.val()) || 15,
                };
                this.updateConfigLabels();
            }

            updateConfigLabels() {
                $('#val-shake-threshold').text(this.config.shakeThreshold);
                $('#val-shake-increment').text(this.config.shakeIncrement.toFixed(1));
                $('#val-click-increment').text(this.config.clickIncrement.toFixed(1));
                $('#val-decay-delay').text(this.config.decayDelay);
                $('#val-decay-rate').text(this.config.decayRate);
            }

            detectCapabilities() {
                if (window.DeviceMotionEvent) {
                    $('#monitor-sensor').text('센서 감지됨');
                } else {
                    $('#monitor-sensor').text('미지원 (탭 모드)');
                }
            }

            bindEvents() {
                // Collapsible settings panel
                $('.tuning-header').on('click', () => {
                    const $content = $('.tuning-content');
                    const isOpen = $content.hasClass('open');

                    if (isOpen) {
                        $content.removeClass('open');
                        $('.tuning-toggle-icon').css('transform', 'rotate(0deg)');
                    } else {
                        $content.addClass('open');
                        $('.tuning-toggle-icon').css('transform', 'rotate(180deg)');
                    }
                });

                // Range slider changes update configs in real-time
                $('input[type="range"]').on('input change', () => {
                    this.loadConfig();
                });

                // Game activation button click
                this.$startBtn.on('click', () => {
                    this.handleStartBtnClick();
                });

                // Fast click/tap triggers gauge fill
                this.$game.on('pointerdown', (e) => {
                    if (!this.isPlaying) return;
                    e.preventDefault();
                    this.registerInput(this.config.clickIncrement);
                });

                // Sync monitor details on custom events
                this.$game.on('shake-game:progress', (e) => {
                    const progressVal = e.originalEvent.detail.progress;
                    this.$monitorProgress.text(progressVal.toFixed(1) + '%');
                });

                this.$game.on('shake-game:state-change', (e) => {
                    this.$monitorState.text(e.originalEvent.detail.state);
                });
            }

            async handleStartBtnClick() {
                if (this.isPlaying) {
                    this.stopGame('stopped');
                    return;
                }

                this.$monitorState.text('권한 요청 중...');
                let permissionGranted = false;

                // Request device motion permission on supported environments (iOS, Samsung, etc.)
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceMotionEvent.requestPermission();
                        permissionGranted = (permissionState === 'granted');
                    } catch (error) {
                        console.error('Motion permission error:', error);
                        alert('모션 권한 요청 도중 문제가 발생했습니다.');
                    }
                } else {
                    // Desktop or standard Android environment which doesn't need explicit permission pop-up
                    permissionGranted = true;
                }

                if (permissionGranted) {
                    this.startGame();
                } else {
                    alert('가속도 센서 권한이 허용되지 않았습니다. 클릭/탭 모드로 동작합니다.');
                    this.startGame(); // Start anyway so clicking still works
                }
            }

            startGame() {
                this.progress = 0;
                this.isPlaying = true;
                this.lastInputTime = Date.now();
                this.lastFrameTime = Date.now();

                this.lastX = null;
                this.lastY = null;
                this.lastZ = null;

                this.$game.addClass('playing');
                $('.action-text').html('마구 흔들거나<br>터치하세요!');
                this.$startBtn.addClass('playing').text('STOP');

                this.dispatchEvent('shake-game:start', { state: '진행 중' });
                this.dispatchEvent('shake-game:state-change', { state: '진행 중' });

                // Register DeviceMotion listener
                this.motionHandler = (e) => this.handleMotion(e);
                window.addEventListener('devicemotion', this.motionHandler, true);

                // Run requestAnimationFrame decay loop
                this.gameLoop();
            }

            stopGame(reason = 'stopped') {
                this.isPlaying = false;

                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }

                if (this.motionHandler) {
                    window.removeEventListener('devicemotion', this.motionHandler, true);
                    this.motionHandler = null;
                }

                this.$game.removeClass('playing');
                $('.action-text').text('대기 중...');
                this.$startBtn.removeClass('playing').text('START');
                this.$monitorMotion.text('0.00');

                const stateText = reason === 'success' ? '성공!' : '대기 중';
                this.dispatchEvent('shake-game:stop', { reason });
                this.dispatchEvent('shake-game:state-change', { state: stateText });
            }

            reset() {
                this.progress = 0;
                this.$fill.css('height', '0%');
                this.dispatchEvent('shake-game:progress', { progress: 0 });
            }

            gameLoop() {
                if (!this.isPlaying) return;

                const now = Date.now();
                const elapsedSinceInput = now - this.lastInputTime;

                // Decay the gauge fill if inactive for decayDelay milliseconds
                if (elapsedSinceInput > this.config.decayDelay && this.progress > 0) {
                    const dt = (now - this.lastFrameTime) / 1000;
                    const decayAmount = this.config.decayRate * dt;
                    const nextProgress = Math.max(0, this.progress - decayAmount);

                    this.progress = nextProgress;
                    this.$fill.css('height', `${this.progress}%`);

                    this.dispatchEvent('shake-game:progress', { progress: this.progress });
                    this.dispatchEvent('shake-game:decay', { progress: this.progress, decayAmount });
                }

                this.lastFrameTime = now;
                this.animationFrameId = requestAnimationFrame(() => this.gameLoop());
            }

            registerInput(increment) {
                if (!this.isPlaying) return;

                this.lastInputTime = Date.now();
                this.lastFrameTime = Date.now(); // Sync frame for decay interval calculation

                const nextProgress = Math.min(100, this.progress + increment);
                this.progress = nextProgress;

                this.$fill.css('height', `${this.progress}%`);
                this.dispatchEvent('shake-game:progress', { progress: this.progress });

                // Trigger nice tap scale animation
                this.$game.removeClass('input-pulse');
                void this.$game[0].offsetWidth; // force element reflow
                this.$game.addClass('input-pulse');

                if (this.progress >= 100) {
                    this.handleSuccess();
                }
            }

            handleSuccess() {
                this.stopGame('success');
                this.dispatchEvent('shake-game:success', { progress: 100 });

                // Device vibration feedback if supported
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100, 50, 200]);
                }

                setTimeout(() => {
                    alert('성공');
                    this.reset();
                }, 120);
            }

            handleMotion(event) {
                if (!this.isPlaying) return;

                const acceleration = event.acceleration || event.accelerationIncludingGravity;
                if (!acceleration) return;

                const x = acceleration.x ?? 0;
                const y = acceleration.y ?? 0;
                const z = acceleration.z ?? 0;

                if (this.lastX !== null) {
                    // Calculate shaking delta (variation in all three axes)
                    const deltaX = Math.abs(x - this.lastX);
                    const deltaY = Math.abs(y - this.lastY);
                    const deltaZ = Math.abs(z - this.lastZ);

                    const motionDelta = deltaX + deltaY + deltaZ;

                    // Display real-time motion on the tuning panel
                    this.$monitorMotion.text(motionDelta.toFixed(2));

                    if (motionDelta > this.config.shakeThreshold) {
                        const now = Date.now();
                        // Limit polling triggers to every 80ms to keep game rate uniform across devices
                        if (now - this.lastShakeTime > 80) {
                            this.registerInput(this.config.shakeIncrement);
                            this.lastShakeTime = now;
                        }
                    }
                }

                this.lastX = x;
                this.lastY = y;
                this.lastZ = z;
            }

            dispatchEvent(name, detail = {}) {
                const event = new CustomEvent(name, {
                    bubbles: true,
                    cancelable: true,
                    detail: {
                        ...detail,
                        progress: this.progress,
                        isPlaying: this.isPlaying,
                        game: this
                    }
                });
                this.$game[0].dispatchEvent(event);
            }
        }

        // Initialize game on document load
        $(function () {
            window.gameInstance = new ShakeGame();
        });
    </script>
</body>

</html>
